apis:
  - name: Zip Global Merchant API
    description: >
      The Zip Global Merchant API provides checkout, charge, capture, refund,
      and cancellation operations for merchants integrating Zip BNPL payments
      into their online storefront. It uses Bearer token authentication and
      supports idempotent requests.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://developers.zip.co/reference/api-docs
    baseURL: https://sand.merchant-api.com
    tags:
      - Checkout
      - Charges
      - Refunds
      - BNPL
    properties:
      - type: Documentation
        url: https://developers.zip.co/reference/api-docs
      - type: GettingStarted
        url: https://developers.zip.co/v2/docs/getting-started
      - type: Sandbox
        url: https://developers.zip.co/v2/docs/sandbox
      - type: Authentication
        url: https://developers.zip.co/v2/reference/authentication
      - type: OpenAPI
        url: https://developers.zip.co/llms.txt
    contact:
      - FN: Zip Developer Support
        url: https://help.zip.co/hc/en-au
        email: ''

  - name: Zip US Gateway API
    description: >
      The Zip US Gateway API enables North American merchants to authorize,
      capture, refund, void, and confirm orders. It uses HMAC-SHA256 signature
      authentication via the X-QP-Signature header and supports both
      synchronous and asynchronous response modes with webhook callbacks.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://docs.us.zip.co/docs/api-implementation
    baseURL: https://gateway.us.zip.co
    tags:
      - Orders
      - Payments
      - Refunds
      - Webhooks
      - North America
    properties:
      - type: Documentation
        url: https://docs.us.zip.co/docs/api-implementation
      - type: GettingStarted
        url: https://docs.us.zip.co/docs/introduction
      - type: CustomIntegration
        url: https://docs.us.zip.co/docs/custom-integration-guide
      - type: Callbacks
        url: https://developers.zip.co/v9-US/docs/callbacks
    contact:
      - FN: Zip US Integrations Team
        url: https://docs.us.zip.co/docs/introduction
        email: ''

  - name: Zip NZ In-Store API
    description: >
      The Zip New Zealand In-Store API enables point-of-sale merchants to
      create, commit, cancel, rollback, and query orders in physical retail
      environments. It uses Bearer token authentication derived from OAuth
      client credentials and supports both merchant-level and store-level
      authentication scopes.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://developers.zip.co/v4/docs/instore-api-specification
    baseURL: https://zip.co/nz/api
    tags:
      - In-Store
      - Point of Sale
      - Orders
      - New Zealand
    properties:
      - type: Documentation
        url: https://developers.zip.co/v4/docs/instore-api-specification
      - type: Sandbox
        url: https://sandbox.zip.co/nz/api
    contact:
      - FN: Zip NZ Partner Support
        url: https://zip.co/nz/business
        email: ''

