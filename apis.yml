name: Zip
description: >
  Zip is a global BNPL (Buy Now Pay Later) and digital wallet platform that
  enables merchants to offer flexible payment plans to consumers at checkout.
  Zip provides REST APIs for checkout integration, order creation, payment
  capture, refunds, voids, merchant management, disputes, and consumer payment
  plan verification. The platform supports in-store, online, and ecommerce
  plugin integrations across Australia, New Zealand, the United States, Canada,
  and other markets.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - BNPL
  - Buy Now Pay Later
  - Digital Wallet
  - Payments
  - Fintech
  - Checkout
  - Merchant Services
created: '2026-06-13'
modified: '2026-06-13'
url: https://raw.githubusercontent.com/api-evangelist/zip-co/refs/heads/main/apis.yml
